<section class="hero-container">
  
  <!-- Capa de Fondo con Animación -->
  <div class="hero-background">
    <!-- Imagen local de barbería elegante (sin dependencia externa) -->
    <img src="assets/hero-barber.jpg" alt="Ambiente de la barbería" loading="eager" fetchpriority="high" decoding="async">
  </div>

  <!-- Capa Oscura para contraste -->
  <div class="hero-overlay"></div>

  <!-- Contenido de Texto -->
  <div class="hero-content">
    <!-- Badge o texto pequeño superior -->
    <span class="hero-subtitle">ESTILO & TRADICIÓN</span>
    
    <h1 class="hero-title">
      Tu mejor versión <br>
      comienza aquí
    </h1>
    
    <p class="hero-description">
      Disfruta de una experiencia de barbería premium donde la técnica clásica se encuentra con el estilo moderno.
    </p>

    <div class="hero-actions">
      <!-- Usamos tu átomo existente -->
      <app-primary-button 
        label="Reservar Cita" 
        (onClick)="scrollToServices()">
      </app-primary-button>
    </div>
  </div>

</section>
