<button (click)="toggleTheme()" class="theme-toggle-btn"
  [class.is-dark]="currentTheme() === 'dark'"
  [title]="'Cambiar a tema ' + (currentTheme() === 'light' ? 'oscuro' : 'claro')"
  [attr.aria-label]="'Cambiar a tema ' + (currentTheme() === 'light' ? 'oscuro' : 'claro')">

  <!-- Único SVG que se transforma de sol a luna (y viceversa) con animación -->
  <svg class="sun-and-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
    <!-- Máscara: el círculo negro talla la luna creciente al deslizarse sobre el disco -->
    <mask class="moon" [attr.id]="maskId">
      <rect x="0" y="0" width="100%" height="100%" fill="white" />
      <circle cx="24" cy="10" r="6" fill="black" />
    </mask>

    <!-- Disco (sol completo / luna creciente según la máscara) -->
    <circle class="sun" cx="12" cy="12" r="6" fill="currentColor" [attr.mask]="'url(#' + maskId + ')'" />

    <!-- Rayos del sol: se escalan y desvanecen al pasar a luna -->
    <g class="sun-beams" stroke="currentColor">
      <line x1="12" y1="1" x2="12" y2="3" />
      <line x1="12" y1="21" x2="12" y2="23" />
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
      <line x1="1" y1="12" x2="3" y2="12" />
      <line x1="21" y1="12" x2="23" y2="12" />
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
    </g>
  </svg>
</button>
